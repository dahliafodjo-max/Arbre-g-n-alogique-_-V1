<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arbre Généalogique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:#FAF6EE;color:#2E2416;min-height:100vh}

header{background:#1A1510;padding:28px 20px 20px;text-align:center}
.orn{font-size:10px;letter-spacing:4px;color:#C9A84C;font-family:Arial,sans-serif;margin-bottom:8px}
h1{font-size:clamp(22px,6vw,40px);font-weight:600;color:#FAF6EE;line-height:1.2}
h1 span{color:#C9A84C}
.hline{width:60px;height:1px;background:#C9A84C;margin:12px auto;position:relative}
.hline::before,.hline::after{content:'◆';position:absolute;top:-5px;font-size:7px;color:#C9A84C}
.hline::before{left:-13px}.hline::after{right:-13px}
.hsub{font-size:12px;color:#A8936A;font-family:Arial,sans-serif;letter-spacing:1px}

.toolbar{background:#2E2416;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:0}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
#search{width:100%;height:40px;padding:0 10px 0 34px;background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.35);border-radius:8px;color:#FAF6EE;font-size:14px;font-family:Arial,sans-serif;outline:none}
#search::placeholder{color:#A8936A}
.btn{height:40px;padding:0 14px;border-radius:8px;font-size:13px;font-family:Arial,sans-serif;cursor:pointer;border:1px solid rgba(201,168,76,.4);background:rgba(201,168,76,.12);color:#E8C97A;white-space:nowrap;-webkit-appearance:none}
.btn.acc{background:#C9A84C;color:#1A1510;border-color:#C9A84C;font-weight:600}
.sbar{width:100%;font-size:11px;color:#A8936A;font-family:Arial,sans-serif;padding-top:2px}
.sbar strong{color:#C9A84C}

.gw{padding:16px 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));gap:12px}

.card{background:#fff;border:1px solid #EDE5D0;border-radius:12px;overflow:hidden}
.card.found{border-color:#C9A84C;box-shadow:0 0 0 2px rgba(201,168,76,.2)}
.ch{background:#1A1510;padding:12px 11px 10px;position:relative}
.ch::after{content:'';position:absolute;bottom:0;left:11px;right:11px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent)}
.crow{display:flex;align-items:center;gap:9px}
.av{width:36px;height:36px;border-radius:50%;border:1.5px solid #C9A84C;background:#3D3020;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#C9A84C;flex-shrink:0;font-family:Arial,sans-serif}
.ci{flex:1;min-width:0}
.cn{font-size:14px;font-weight:600;color:#FAF6EE;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct{font-size:9px;letter-spacing:1px;color:#C9A84C;font-family:Arial,sans-serif;text-transform:uppercase;margin-top:1px}
.badge{background:rgba(201,168,76,.18);border:1px solid rgba(201,168,76,.4);color:#C9A84C;font-size:11px;font-weight:600;border-radius:20px;padding:2px 8px;flex-shrink:0;font-family:Arial,sans-serif}
.dcf{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}

.pls{padding:7px 9px 10px}
.pl{display:flex;align-items:center;padding:5px 5px;border-radius:6px;gap:6px}
.pl:active{background:#FAF6EE}
.pd{width:5px;height:5px;border-radius:50%;background:#C9A84C;flex-shrink:0;opacity:.5}
.pn{flex:1;font-size:13px;color:#2E2416;line-height:1.3;font-family:Arial,sans-serif}
.pn.hit{font-weight:600}
.dp{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:#ddd;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:Arial,sans-serif}
.ap{width:100%;margin-top:6px;height:32px;border:1px dashed rgba(201,168,76,.4);background:transparent;color:#C9A84C;font-size:13px;font-family:Arial,sans-serif;border-radius:7px;cursor:pointer}

.ov{display:none;position:fixed;inset:0;background:rgba(10,7,3,.65);z-index:200;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:22px 20px 32px;width:100%;max-width:500px}
.modal h3{font-size:18px;font-weight:600;color:#1A1510;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid #EDE5D0}
.modal label{font-size:11px;letter-spacing:.7px;color:#A8936A;font-family:Arial,sans-serif;text-transform:uppercase;display:block;margin:11px 0 4px}
.modal input,.modal select{width:100%;height:44px;padding:0 12px;border:1px solid #EDE5D0;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;color:#2E2416;background:#FAF6EE;outline:none;-webkit-appearance:none}
.mbtns{display:flex;gap:8px;margin-top:18px}
.mbtns .btn{flex:1;height:44px;font-size:15px}
</style>
</head>
<body>
<header>
  <div class="orn">&#10022; Organisation &#10022;</div>
  <h1>Arbre <span>Généalogique</span></h1>
  <div class="hline"></div>
  <div class="hsub">Bergers de Famille &amp; FDs</div>
</header>

<div class="toolbar">
  <div class="sw">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input type="text" id="search" placeholder="Rechercher un nom…" oninput="render()">
  </div>
  <button class="btn" onclick="openModal('FD')">+ FD</button>
  <button class="btn" onclick="openModal('cf')">+ Berger</button>
  <div class="sbar" id="stats"></div>
</div>

<div class="gw"><div class="grid" id="grid"></div></div>

<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="mt"></h3>
    <div id="mb"></div>
    <div class="mbtns">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn acc" onclick="confirmModal()">Confirmer</button>
    </div>
  </div>
</div>

<script>
let db = {"Axel ONDO": ["Désiré AYORI", "Didier KINGOMBE", "Michel Junior KOUNDOUNO", "Christopher MAPAGA", "Evan Grâce NDALA", "Declane TCHILOEMBA"], "Cedric NGOULOU": ["Carlos DALUZ", "Patrick DEJEAN", "Davy GOUMBA", "Novalie HOUNGBEDJI", "Dan ITOMBO", "Adingra KOUAME", "Zana OUATTARA"], "Christopher MBUNDANI": ["Steven SATCHIVI"], "Dominique EKOTTO": ["Valérie POATY", "Ornella ZAMBA", "Nathalie NEUGWA"], "Eunice IGNAMBI": ["Pauline DROWA", "Nora MAIGA", "Naomi ZAKPA", "Dana A", "Shalom SAH-TOSSOU"], "Georges ELENGA-NGOLLO": ["Jeany FOTSO DE TIETSE", "Emmanuel KOUASSI", "Gloria SAFOUESS", "Reina SETHSON"], "Herve MAPAMA": ["Jude Bernard GWODOG", "Hophni MOUKOUMBI"], "Jessica LAZA MANZAMBI": ["Jennifer DESTOUCHES", "Naiyisha TCHANQUE", "Eunice IGNAMBI", "Dana A", "Nora MAIGA", "Naomi ZAKPA", "Shalom SAH-TOSSOU", "Pauline DROWA", "Emeline GUSTAVE", "Saimen CHAND", "Loana KIMBEMBE"], "Joelle-Andrée TIEHI": ["Céleste DJIMTOÏNGAR", "Phaelle FILANKEMBO", "Natacha KASSANDA DA SILVA", "Alouska LAKE", "Ruffine MUKENGULE", "Florance OULA", "Francesca OSSOUNGOU", "Amanda ONGUI"], "Marie SANTOS": ["Leida BAPTISTA", "Rockya CISSE", "Dahlia FODJO", "Kristie Evans TCHUNDJU MAYOUDOM", "Mobayi PELE", "Treicy KASSAT", "Kerene KERENE"], "Marina-Ingrid N'GUESSAN": ["Careine VIGAN", "Yaël MEBALEY", "Françoise ZINSOU", "Jotricia LOUBELO", "Oumou NIANGADOU", "Vanessa AGNAMAN", "Emmanuel ADA BIBANG"], "Mobayi PELE": ["Léonie ATCHABAO", "Rebecca DEGUE"], "Naiyisha TCHANQUE": ["Loana KIMBEMBE", "Emeline GUSTAVE", "Saimen CHAND"], "Nelly EYOUM": ["Sybelle AMBETO", "Naomi MALELA", "Lynda Frazi MINGOLÉ"], "Nina NGOULOU": ["Prescillia BEMBICANI", "Suzie DEJEAN", "Hermione EMATI", "Emilie Audrey FONING", "Hilary JYKY", "Christelle MINTSA", "Astrid TCHANA", "Fausta TCHISSAMBOU", "Destine KOKOLO", "Amina KEMBI", "Judith KOUASSI"], "Prescilia KIALA": [], "Rebbie MAPAMA": ["Manuella KOUAMO"], "Rebecca MOMBO": ["Colombe GOLET MOMBOULI", "Ange KENGNE", "Kady Desiree BOIGNON OUATTARA", "Pricilia NGOUFACK", "Lauviah TCHILOEMBA", "Valerie AGNUI", "Marie Confort KUKPORTIE", "Marie France BOMBA", "Dolores BIANZA", "Babi MUTOMBO", "Noura LENGANI", "Oceane NGUEKO"], "Trésor TSHIMANGA": ["Kadoukpè BABAODI", "Bruno DETCHINLI", "Moïse DJIMTOINGAR TOGDE", "Rebeca TSHIMANGA", "Ben ILBOUDO", "Mohamed SACO", "Jenovic NGOY", "Richard HENRI", "Ange SIANE", "Ange BINSA", "Ariane NWEGANG"], "Vianney PELE": ["Blaise NGOUA NGOUA", "Icare OUATTARA", "Vianney PELE"], "Zeina MEMENE": ["Chryssina SADJAN", "Lyne Karla VEVO", "Sarah TSOLENYANU", "Sabrina ALEXIS"]};
let ma = null;

function ini(n){return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const g=document.getElementById('grid');
  g.innerHTML='';
  Object.keys(db).sort((a,b)=>a.localeCompare(b,'fr')).forEach(cf=>{
    const fds=db[cf];
    const cfm=cf.toLowerCase().includes(q);
    const hits=fds.filter(p=>p.toLowerCase().includes(q));
    if(q&&!cfm&&hits.length===0)return;
    const show=(q&&!cfm)?hits:fds;
    const card=document.createElement('div');
    card.className='card'+(q&&(cfm||hits.length>0)?' found':'');
    card.innerHTML=`
      <div class="ch">
        <button class="dcf" onclick="delCF('${esc(cf)}')" >✕</button>
        <div class="crow">
          <div class="av">${ini(cf)}</div>
          <div class="ci">
            <div class="cn">${cf}</div>
            <div class="ct">Berger de famille</div>
          </div>
          <div class="badge">${fds.length}</div>
        </div>
      </div>
      <div class="pls">
        ${show.map(p=>`<div class="pl"><div class="pd"></div><span class="pn${q&&p.toLowerCase().includes(q)?' hit':''}">${p}</span><button class="dp" onclick="delFD('${esc(cf)}','${esc(p)}')">✕</button></div>`).join('')}
        <button class="ap" onclick="openModal('FD','${esc(cf)}')">+ Ajouter un FD</button>
      </div>`;
    g.appendChild(card);
  });
  document.getElementById('stats').innerHTML=`<strong>${Object.keys(db).length}</strong> Bergers · <strong>${Object.values(db).flat().length}</strong> FDs`;
}

function delFD(cf,p){if(!confirm('Retirer "'+p+'" ?'))return;db[cf]=db[cf].filter(x=>x!==p);render()}
function delCF(cf){if(!confirm('Supprimer "'+cf+'" ?'))return;delete db[cf];render()}

function openModal(t,pre){
  pre=pre||'';ma=t;
  const b=document.getElementById('mb');
  if(t==='FD'){
    document.getElementById('mt').textContent='Ajouter un FD';
    const o=Object.keys(db).sort((a,b)=>a.localeCompare(b,'fr')).map(cf=>`<option value="${cf}"${cf===pre?' selected':''}>${cf}</option>`).join('');
    b.innerHTML='<label>Berger de famille</label><select id="mc">'+o+'</select><label>Prénom</label><input id="mp" placeholder="Prénom"><label>Nom</label><input id="mn" placeholder="NOM">';
  }else{
    document.getElementById('mt').textContent='Nouveau Berger';
    b.innerHTML='<label>Prénom</label><input id="cp" placeholder="Prénom"><label>Nom</label><input id="cn2" placeholder="NOM">';
  }
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>{const f=b.querySelector('input,select');if(f)f.focus()},100);
}
function closeModal(){document.getElementById('ov').classList.remove('open');ma=null}
function confirmModal(){
  if(ma==='FD'){
    const cf=document.getElementById('mc').value;
    const p=document.getElementById('mp').value.trim();
    const n=document.getElementById('mn').value.trim().toUpperCase();
    if(!p||!n){alert('Remplir tous les champs');return}
    if(!db[cf].includes(p+' '+n))db[cf].push(p+' '+n);
  }else{
    const p=document.getElementById('cp').value.trim();
    const n=document.getElementById('cn2').value.trim().toUpperCase();
    if(!p||!n){alert('Remplir tous les champs');return}
    if(!db[p+' '+n])db[p+' '+n]=[];
  }
  closeModal();render();
}
render();
</script>
</body>
</html>
